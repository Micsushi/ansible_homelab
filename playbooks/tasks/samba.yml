---
# Samba - File sharing server
# Shares:
#   shared  → read-write, your home shared folder
#   media   → read-only, Jellyfin media library (movies + TV)
#   photos  → read-write, Immich photos library

- name: Create Samba config directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/samba/config"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: Create Samba container
  community.docker.docker_container:
    name: samba
    image: dperson/samba:latest
    state: started
    restart_policy: unless-stopped
    volumes:
      - "{{ data_dir }}/shared:/shared"
      - "{{ data_dir }}/media:/media:ro"
      - "{{ data_dir }}/photos:/photos"
    networks:
      - name: homelab
    ports:
      - "139:139"
      - "445:445"
    command:
      - "-u"
      - "{{ username }};{{ samba_password | default('changeme') }}"
      - "-s"
      - "shared;/shared;yes;no;no;{{ username }}"
      - "-s"
      - "media;/media;yes;yes;no;{{ username }}"
      - "-s"
      - "photos;/photos;yes;no;no;{{ username }}"
    env:
      TZ: "{{ timezone }}"

- name: Samba setup summary
  ansible.builtin.debug:
    msg:
      - "Samba shares available at \\\\{{ ip_address }}\\"
      - "  shared  → read-write  ({{ data_dir }}/shared)"
      - "  media   → read-only   ({{ data_dir }}/media)"
      - "  photos  → read-write  ({{ data_dir }}/photos)"
      - "Connect with user: {{ username }} and your samba_password"
